name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: cargo check
        run: cargo check --manifest-path app/src-tauri/Cargo.toml

      - name: JS/Shell 语法检查
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            node --check "$f" || fail=1
          done < <(find app/ui hooks scripts \( -name '*.js' -o -name '*.mjs' \) -print0)
          while IFS= read -r -d '' f; do
            bash -n "$f" || fail=1
          done < <(find . hooks scripts -maxdepth 1 -name '*.sh' -print0)
          exit $fail
